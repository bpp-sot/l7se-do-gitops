apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-demo-app
  labels:
    app: gitops-demo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gitops-demo-app
  template:
    metadata:
      labels:
        app: gitops-demo-app
    spec:
      containers:
        - name: gitops-demo-app
          # Exercise 4: you will update this image tag to trigger a GitOps sync
          image: ghcr.io/bpp-sot/l7se-do-gitops-app:1.0.0
          ports:
            - containerPort: 3000
          env:
            - name: APP_VERSION
              value: "1.0.0"
            - name: APP_ENV
              value: "dev"
            - name: APP_COLOUR
              value: "#0ea5e9"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"
