apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: gitops-app

resources:
  - ../../base

# Patches override base values for the dev environment
patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/env/1/value
        value: "dev"
      - op: replace
        path: /spec/template/spec/containers/0/env/2/value
        value: "#0ea5e9"
    target:
      kind: Deployment
      name: gitops-demo-app
